<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GOBBLE — Print Poster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 210mm;
    height: 297mm;
    background: #fff;
  }

  .poster {
    width: 210mm;
    height: 297mm;
    background: #FFFDF5;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Space Grotesk', Arial, sans-serif;
  }

  /* ── Background dots ── */
  .poster::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #1502FF18 1.5px, transparent 1.5px);
    background-size: 18px 18px;
    z-index: 0;
  }

  /* ── Corner flowers SVG ── */
  .flowers-top {
    position: absolute;
    top: 0; left: 0;
    width: 210mm;
    height: 88mm;
    z-index: 1;
  }
  .flowers-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 210mm;
    height: 72mm;
    z-index: 1;
  }

  /* ── Content ── */
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 14mm;
  }

  .top-spacer { height: 54mm; }

  /* tio badge */
  .tio-badge {
    font-family: 'Inter', sans-serif;
    font-size: 11pt;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: #1502FF;
    text-transform: uppercase;
    margin-bottom: 3mm;
    border: 1.5px solid #1502FF;
    padding: 2px 10px;
    border-radius: 20px;
  }

  /* GOBBLE title */
  .title {
    font-size: 72pt;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
    background: linear-gradient(135deg, #1502FF 0%, #F83098 55%, #FEE52A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 3mm;
  }

  /* Fruit strip */
  .fruits {
    font-size: 28pt;
    letter-spacing: 0.12em;
    margin-bottom: 5mm;
  }

  /* Tagline */
  .tagline {
    font-size: 16pt;
    font-weight: 700;
    color: #111;
    text-align: center;
    line-height: 1.35;
    margin-bottom: 2mm;
  }
  .tagline span {
    color: #F83098;
  }

  .sub-tagline {
    font-family: 'Inter', sans-serif;
    font-size: 10pt;
    color: #555;
    text-align: center;
    margin-bottom: 8mm;
    letter-spacing: 0.04em;
  }

  /* QR + URL block */
  .qr-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fff;
    border: 3px solid #1502FF;
    border-radius: 6mm;
    padding: 5mm 8mm 4mm;
    margin-bottom: 6mm;
    box-shadow: 4px 4px 0 #F83098;
  }

  .qr-block img {
    width: 38mm;
    height: 38mm;
    image-rendering: pixelated;
    display: block;
    margin-bottom: 3mm;
  }

  .url {
    font-size: 15pt;
    font-weight: 900;
    color: #1502FF;
    letter-spacing: 0.01em;
  }

  /* How to play */
  .how {
    background: #1502FF;
    color: #fff;
    border-radius: 4mm;
    padding: 4mm 7mm;
    text-align: center;
    width: 100%;
    margin-bottom: 5mm;
  }
  .how-title {
    font-size: 9pt;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 2mm;
  }
  .how-steps {
    font-size: 10pt;
    font-weight: 600;
    line-height: 1.7;
    font-family: 'Inter', sans-serif;
  }

  /* Bottom spacer for flowers */
  .bottom-spacer { height: 30mm; }

  @media print {
    html, body { margin: 0; padding: 0; }
    .poster { page-break-after: avoid; }
  }
</style>
</head>
