<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@page { size: A4 portrait; margin: 0; }

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; min-height:100vh;
  background:#888;
  display:flex; justify-content:center; align-items:flex-start;
  padding:20px;
  font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;
}

#sheet {
  width:210mm; height:297mm;
  background:#888;
  flex-shrink:0;
  transform-origin: top center;
  display:grid;
  grid-template-columns: 85mm 85mm;
  grid-template-rows: repeat(5, 54mm);
  column-gap: 10mm;
  row-gap: 3mm;
  padding: 7.5mm 15mm;
}

.card {
  width:85mm; height:54mm;
  background:#FBF7EE;
  position:relative; overflow:hidden;
  display:flex; align-items:center;
  font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;
}

/* dot texture */
.card::before {
  content:'';
  position:absolute; inset:0;
  background-image: radial-gradient(circle, rgba(10,10,10,0.06) 1px, transparent 1px);
  background-size: 4mm 4mm;
}

/* pixel flowers */
.cf { position:absolute; image-rendering:pixelated; image-rendering:crisp-edges; }

/* left: title block */
.card-left {
  position:relative; z-index:2;
  width:46mm; flex-shrink:0;
  padding:5mm 3mm 5mm 6mm;
  display:flex; flex-direction:column; justify-content:center; gap:1mm;
}
.pink {
  font-family:'Instrument Serif',serif;
  font-style:italic; font-weight:400;
  font-size:30pt; color:#F83098;
  letter-spacing:-0.04em; line-height:0.9;
  display:block;
}
.blue {
  display:inline-block;
  font-size:22pt; font-weight:800; color:#FBF7EE;
  background:#1502FF; letter-spacing:-0.03em; line-height:0.9;
  padding:0.05em 0.12em;
  border:0.4mm solid #0A0A0A;
  box-shadow: 0.8mm 0.8mm 0 #0A0A0A;
}

/* right: QR + URL */
.card-right {
  position:relative; z-index:2;
  flex:1;
  padding:4mm 5mm 4mm 3mm;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2mm;
}
.card-qr {
  width:26mm; height:26mm;
  image-rendering:pixelated;
  display:block;
}
.card-url {
  font-size:7.5pt; font-weight:800; color:#1502FF;
  letter-spacing:-0.01em; text-align:center;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
</head>
<body>
<div id="sheet">

  <!-- reusable flower SVGs defined once via JS, injected into each card -->

</div>

<button onclick="window.print()" style="position:fixed;bottom:16px;right:16px;z-index:999;background:#0A0A0A;color:#FEE52A;border:none;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;border-radius:6px;letter-spacing:.05em;text-transform:uppercase;">Print / Save PDF</button>

<script>
const FLOWER_YELLOW = `<svg class="cf" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect x="11" y="0" width="2" height="3" fill="#FEE52A"/>
  <rect x="16" y="1" width="2" height="2" fill="#FEE52A"/>
  <rect x="20" y="4" width="2" height="2" fill="#FEE52A"/>
  <rect x="20" y="8" width="3" height="2" fill="#FEE52A"/>
  <rect x="19" y="12" width="2" height="2" fill="#FEE52A"/>
  <rect x="15" y="16" width="2" height="2" fill="#FEE52A"/>
  <rect x="11" y="19" width="2" height="3" fill="#FEE52A"/>
  <rect x="6" y="16" width="2" height="2" fill="#FEE52A"/>
  <rect x="3" y="12" width="2" height="2" fill="#FEE52A"/>
  <rect x="1" y="8" width="3" height="2" fill="#FEE52A"/>
  <rect x="2" y="4" width="2" height="2" fill="#FEE52A"/>
  <rect x="6" y="1" width="2" height="2" fill="#FEE52A"/>
  <rect x="7" y="5" width="10" height="12" fill="#F83098"/>
  <rect x="5" y="7" width="14" height="8" fill="#F83098"/>
  <rect x="8" y="6" width="8" height="10" fill="#0A0A0A"/>
  <rect x="6" y="8" width="12" height="6" fill="#0A0A0A"/>
  <rect x="9" y="8" width="2" height="2" fill="#FEE52A"/>
  <rect x="12" y="8" width="2" height="2" fill="#FEE52A"/>
  <rect x="10" y="10" width="4" height="2" fill="#FEE52A"/>
</svg>`;

const FLOWER_PINK = `<svg class="cf" viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect x="11" y="0" width="2" height="3" fill="#F83098"/>
  <rect x="14" y="1" width="3" height="2" fill="#F83098"/>
  <rect x="18" y="5" width="3" height="2" fill="#F83098"/>
  <rect x="11" y="12" width="2" height="3" fill="#F83098"/>
  <rect x="3"  y="5" width="3" height="2" fill="#F83098"/>
  <rect x="6"  y="1" width="3" height="2" fill="#F83098"/>
  <rect x="9" y="4" width="6" height="7" fill="#FEE52A"/>
  <rect x="8" y="5" width="8" height="5" fill="#FEE52A"/>
  <rect x="10" y="5" width="2" height="2" fill="#0A0A0A"/>
  <rect x="13" y="5" width="2" height="2" fill="#0A0A0A"/>
  <rect x="11" y="9" width="2" height="2" fill="#0A0A0A"/>
  <rect x="11" y="15" width="2" height="6" fill="#2d6a2d"/>
  <rect x="7"  y="17" width="4" height="2" fill="#3a8a3a"/>
  <rect x="9"  y="21" width="6" height="2" fill="#2d6a2d"/>
</svg>`;

const CARD_HTML = `
  <div class="card-left">
    <span class="pink">gobble</span>
    <span class="blue">challenge</span>
  </div>
  <div class="card-right">
    <img class="card-qr" src="qr.jpg" alt="QR">
    <div class="card-url">gobble.tio.ist</div>
  </div>
`;

const FLOWERS = [
  // top-right yellow flower
  { svg: FLOWER_YELLOW, style: 'right:-1mm;top:-1mm;width:15mm;height:15mm;opacity:0.85;' },
  // bottom-left pink flower
  { svg: FLOWER_PINK, style: 'left:-1mm;bottom:-1mm;width:10mm;height:12mm;opacity:0.8;' },
];

const sheet = document.getElementById('sheet');
for (let i = 0; i < 10; i++) {
  const card = document.createElement('div');
  card.className = 'card';
  let inner = '';
  for (const f of FLOWERS) {
    inner += f.svg.replace('class="cf"', `class="cf" style="${f.style}"`);
  }
  inner += CARD_HTML;
  card.innerHTML = inner;
  sheet.appendChild(card);
}

function scaleSheet() {
  const sheet = document.getElementById('sheet');
  const vw = window.innerWidth - 40;
  const mmToPx = 96 / 25.4;
  const scale = Math.min(1, vw / (210 * mmToPx));
  sheet.style.transform = scale < 1 ? `scale(${scale}) translateX(-50%)` : '';
  sheet.style.marginLeft = scale < 1 ? '50%' : 'auto';
  document.body.style.minHeight = (297 * mmToPx * scale + 60) + 'px';
}
scaleSheet();
window.addEventListener('resize', scaleSheet);
</script>
</body>
</html>
